global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['api:8080']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter:métriques système (CPU, RAM, disk) pour dashboard Grafana 1860
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']